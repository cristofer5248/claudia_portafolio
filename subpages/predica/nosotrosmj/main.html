<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva | Alexis</title>
    <style>
        /* 1. BASE NEGRA */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Fondo negro total */
        }

        /* 2. CONTENEDOR CON MARGEN DEL 15% */
        #main-container {
            position: absolute;
            top: 2%;
            left: 2%;
            right: 2%;
            bottom: 2%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-size: contain; /* Para que la imagen no se corte */
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
        }

        /* 3. REPRODUCTOR AUTOCULTable */
        .audio-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 100;
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 1;
        }

        /* Clase para esconder el audio */
        .audio-hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        /* 4. CONTROLES EXTERNOS (Fuera del margen para que no estorben) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 20px 10px;
            cursor: pointer;
            font-size: 30px;
            z-index: 110;
            transition: 0.3s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #prev { left: 5%; }
        #next { right: 5%; }

        .counter {
            position: absolute;
            top: 5%;
            left: 5%;
            color: #777;
            font-size: 0.9rem;
        }

        .cherry-btn {
            position: absolute;
            top: 5%;
            right: 5%;
            background: #ff4d4d;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            z-index: 110;
            border: 1px solid white;
            transition: 0.3s;
        }
        .cherry-btn:hover { transform: scale(1.1); }

    </style>
</head>
<body onclick="showControls()" onmousemove="showControls()">

    <div class="counter" id="counter">SLIDE 1 / 15</div>

    <a href="cereza.html" class="cherry-btn">🍒 LA CEREZA DEL PASTEL</a>

    <div id="main-container">
        <div id="bg-image"></div>
    </div>

    <button class="nav-btn" id="prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn" id="next" onclick="changeSlide(1)">&#10095;</button>

    <div class="audio-container" id="audiobox">
        <iframe src="https://docs.google.com/file/d/1qG_Le_r5yAmUk3PB_RyNOeLWqFDmmIcE/preview"></iframe>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 15;
        const bgElement = document.getElementById('bg-image');
        const counterElement = document.getElementById('counter');
        const audioBox = document.getElementById('audiobox');
        let hideTimeout;

        function updateSlide() {
            bgElement.style.backgroundImage = `url('images/${currentSlide}.jpg')`;
            counterElement.innerText = `SLIDE ${currentSlide} / ${totalSlides}`;
        }

        function changeSlide(direction) {
            currentSlide += direction;
            if (currentSlide > totalSlides) currentSlide = 1;
            if (currentSlide < 1) currentSlide = totalSlides;
            updateSlide();
        }

        // Lógica para esconder el audio
        function showControls() {
            audioBox.classList.remove('audio-hidden');
            
            // Limpiar el contador previo
            clearTimeout(hideTimeout);
            
            // Esconder después de 3 segundos de inactividad
            hideTimeout = setTimeout(() => {
                audioBox.classList.add('audio-hidden');
            }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            showControls();
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        window.onload = () => {
            updateSlide();
            showControls(); // Aparece al cargar
        };
    </script>
</body>
</html>
