<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva | Alexis</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        /* Contenedor de la imagen de fondo */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
        }

        /* Botones laterales */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 25px 15px;
            cursor: pointer;
            font-size: 30px;
            border-radius: 10px;
            transition: 0.3s;
            z-index: 10;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.5); }
        #prev { left: 10px; }
        #next { right: 10px; }

        /* Contenedor del audio de Google Drive */
        .audio-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(255,255,255,0.95);
            padding: 5px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        iframe {
            border: none;
            width: 100%;
            height: 60px;
            border-radius: 10px;
        }

        /* Contador de Slides */
        .counter {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* LA CEREZA DEL PASTEL - Botón */
        .cherry-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            border: 2px solid white;
        }

        .cherry-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            background: #e60000;
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.6);
        }

        .cherry-emoji {
            font-size: 1.5em;
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="overlay"></div>
    
    <div class="counter" id="counter">SLIDE 1 / 15</div>

    <a href="cereza.html" class="cherry-btn">
        <span class="cherry-emoji">🍒</span>
        LA CEREZA DEL PASTEL
    </a>

    <button class="nav-btn" id="prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn" id="next" onclick="changeSlide(1)">&#10095;</button>

    <div class="audio-container">
        <iframe src="https://docs.google.com/file/d/1qG_Le_r5yAmUk3PB_RyNOeLWqFDmmIcE/preview"></iframe>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 15;
        const bgElement = document.getElementById('bg-image');
        const counterElement = document.getElementById('counter');

        function updateSlide() {
            // Cambia el fondo a images/1.jpg, images/2.jpg, etc.
            bgElement.style.backgroundImage = `url('images/${currentSlide}.jpg')`;
            counterElement.innerText = `SLIDE ${currentSlide} / ${totalSlides}`;
        }

        function changeSlide(direction) {
            currentSlide += direction;
            if (currentSlide > totalSlides) currentSlide = 1;
            if (currentSlide < 1) currentSlide = totalSlides;
            updateSlide();
        }

        // Detectar flechas del teclado para cambiar diapositivas
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        // Carga inicial
        updateSlide();
    </script>
</body>
</html>
